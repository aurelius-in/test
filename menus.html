<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropdown Navigation Bar</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; }
  .navbar { overflow: hidden; background-color: #333; }
  .navbar a { float: left; font-size: 16px; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
  .dropdown { float: left; overflow: hidden; }
  .dropdown .dropbtn { border: none; outline: none; color: white; padding: 14px 16px; background-color: inherit; font-family: inherit; margin: 0; }
  .navbar a:hover, .dropdown:hover .dropbtn { background-color: red; }
  .dropdown-content { display: none; position: absolute; background-color: #f9f9f9; min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; }
  .dropdown-content a { float: none; color: black; padding: 12px 16px; text-decoration: none; display: block; text-align: left; }
  .dropdown-content a:hover { background-color: #ddd; }
  .show { display: block; }
</style>
</head>
<body>

<div class="navbar">
  <div class="dropdown">
    <button class="dropbtn" onclick="toggleDropdown('segment-dropdown')">Segment</button>
    <div class="dropdown-content" id="segment-dropdown">
      <a href="#">Link 1</a>
      <a href="#">Link 2</a>
      <a href="#">Link 3</a>
    </div>
  </div> 
  <div class="dropdown">
    <button class="dropbtn" onclick="toggleDropdown('paidfor-dropdown')">Paid for...</button>
    <div class="dropdown-content" id="paidfor-dropdown">
      <a href="#">Link 1</a>
      <a href="#">Link 2</a>
      <a href="#">Link 3</a>
    </div>
  </div> 
  <!-- Add more dropdowns here following the same structure -->
</div>

<script>
// Close the dropdown if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    for (var i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}

function toggleDropdown(id) {
  document.getElementById(id).classList.toggle("show");
}
</script>

</body>
</html>
