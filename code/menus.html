<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Bar with Dropdowns and Search</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; }
  .navbar { overflow: hidden; background-color: #007bff; }
  .navbar a, .navbar input[type=text], .navbar label { float: left; font-size: 16px; color: white; text-align: center; padding: 14px 16px; text-decoration: none; border: none; background-color: inherit; }
  .navbar input[type=text] { margin: 4px 0; border-radius: 4px; }
  .dropdown { float: left; overflow: hidden; }
  .dropdown .dropbtn { font-size: 16px; border: none; outline: none; color: white; padding: 14px 16px; background-color: inherit; margin: 0; border-radius: 4px; cursor: pointer; }
  .dropdown-content { display: none; position: absolute; background-color: #f9f9f9; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; border-radius: 4px; }
  .dropdown-content a { color: black; padding: 12px 16px; text-decoration: none; display: block; text-align: left; }
  .dropdown-content a:hover { background-color: #ddd; }
  .show { display: block; }
  .search-container { float: right; }
  .toggle-switch { position: relative; display: inline-block; width: 60px; height: 34px; margin: 4px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
  .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: #2196F3; }
  input:focus + .slider { box-shadow: 0 0 1px #2196F3; }
  input:checked + .slider:before { transform: translateX(26px); }
  .toggle-switch-label { margin-right: 10px; color: white; }
</style>
</head>
<body>

<div class="navbar">
  <div class="dropdown">
    <button class="dropbtn" onclick="toggleDropdown('segment-dropdown')">Segment</button>
    <div class="dropdown-content" id="segment-dropdown">
      <a href="#">Option 1</a>
      <a href="#">Option 2</a>
      <a href="#">Option 3</a>
    </div>
  </div> 
  <!-- Repeat for each dropdown menu -->
  <!-- ... -->
  
  <div class="search-container">
    <label class="toggle-switch-label" for="search-toggle">Search by TIN</label>
    <label class="toggle-switch">
      <input type="checkbox" id="search-toggle">
      <span class="slider"></span>
    </label>
    <label class="toggle-switch-label" for="search-toggle">Search by Name</label>
    <input type="text" placeholder="Search..." id="search-input">
  </div>
</div>

<script>
// Close the dropdown if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    for (var i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}

function toggleDropdown(id) {
  document.getElementById(id).classList.toggle("show");
}
</script>

</body>
</html>
