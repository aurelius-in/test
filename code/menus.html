<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Bar with Dropdowns and Search</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; font-size: 20 }
  .navbar { overflow: hidden; background-color: #007bff; display: flex; justify-content: space-between; padding: 0 20px; }
  .navbar a, .navbar input[type=text], .navbar .label { color: white; text-align: center; padding: 14px 16px; text-decoration: none; border: none; background-color: inherit; }
  .navbar a { border-radius: 4px; }
  .navbar input[type=text] { border-radius: 4px; margin-left: 8px; }
  .dropdown { position: relative; }
  .dropdown .dropbtn { font-size: 20px; border: 2px; outline: 2px:color: #007bff; /* Text color changed for visibility on white */ padding: 14px 16px;  background-color: white; margin: 0;  border-radius: 4px;  cursor: pointer; }
  .dropdown-content { display: none; position: absolute; background-color: #f9f9f9; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); border-radius: 4px; }
  .dropdown-content a { color: black; padding: 12px 16px; text-decoration: none; display: block; text-align: left; border-radius: 4px; }
  .dropdown-content a:hover { background-color: #ddd; }
  .search-container { display: flex; align-items: center; }
  .search-container input[type=text] { padding: 6px; width: 200px; }
  .search-container label { margin-right: 10px; }
  .toggle-switch { position: relative; display: inline-block; width: 60px; height: 34px; margin: 4px; }
  .toggle-switch input { display: none; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
  .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: #2196F3; }
  input:checked + .slider:before { transform: translateX(26px); }
  .label { font-size: 16px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .label:hover { background-color: #0056b3; border-radius: 4px; }
</style>
</head>
<body>

<div class="navbar">
  <div class="dropdown">
    <button class="dropbtn" onclick="toggleDropdown('segment-dropdown')">Segment</button>
    <div class="dropdown-content" id="segment-dropdown">
      <a href="#">Option 1</a>
      <a href="#">Option 2</a>
      <a href="#">Option 3</a>
    </div>
  </div>
  <a id="paidfor">Paid for...</a>
  <a id="percentpaidfor">% Paid for...</a>
  <a id="percentpatientswith">% Patients with...</a>
  <a id="percentvisitswith">% Visits with...</a>
  <a id="numberpatients"># Patients...</a>
  <a id="numbervisits"># Visits...</a>
  <a id="recent">Recent...</a>
  <a id="total">Total...</a>
  <div class="search-container">
    <label class="label">Search by TIN</label>
    <label class="toggle-switch">
      <input type="checkbox" id="search-toggle">
      <span class="slider"></span>
    </label>
    <label class="label">Search by Name</label>
    <input type="text" placeholder="Search..." id="search-input">
  </div>
</div>
<script>
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    for (var i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
function toggleDropdown(id) {
  document.getElementById(id).classList.toggle("show");
}
</script>
</body>
</html>
